<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Information Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:40px;
        }

        .container{
            width:600px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        label{
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border-radius:5px;
            border:1px solid #ccc;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        #lastDayDiv{
            display:none;
        }
    </style>
</head>
<body>

<div class="container">

<h2>Employee Information Form</h2>

<form id="employeeForm" action="/employee" method="POST">

<label>Employee Name</label>
<input
    type="text"
    id="employeeName"
    name="employee_name"
    required>

<label>Date of Birth</label>
<input
    type="date"
    id="dob"
    name="dob"
    required>

<label>Total Years of Experience</label>
<input
    type="number"
    id="totalExperience"
    name="total_experience"
    min="0"
    step="0.1"
    required>

<label>Relevant Experience (Years)</label>
<input
    type="number"
    id="relevantExperience"
    name="relevant_experience"
    min="0"
    step="0.1"
    required>

<label>Current Employer Name</label>
<input
    type="text"
    id="employer"
    name="employer_name"
    required>

<label>Notice Period (Months)</label>
<input
    type="number"
    id="noticePeriod"
    name="notice_period"
    min="0"
    required>

<label>Currently Serving Notice Period?</label>

<select
    id="servingNotice"
    name="serving_notice">

    <option value="No">No</option>
    <option value="Yes">Yes</option>

</select>

<div id="lastDayDiv">

<label>Last Working Day</label>

<input
    type="date"
    id="lastWorkingDay"
    name="last_working_day">

</div>

<label>Email Address</label>

<input
    type="email"
    id="email"
    name="email"
    required>

<label>Phone Number</label>

<input
    type="tel"
    id="phone"
    name="phone"
    pattern="[0-9]{10}"
    placeholder="10 digit mobile number"
    required>

<button type="submit">Submit</button>

</form>

</div>

<script>

const servingNotice=document.getElementById("servingNotice");
const lastDayDiv=document.getElementById("lastDayDiv");

servingNotice.addEventListener("change",function(){

    if(this.value==="Yes"){
        lastDayDiv.style.display="block";
    }
    else{
        lastDayDiv.style.display="none";
    }

});

</script>

</body>
</html>
